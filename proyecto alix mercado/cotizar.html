<main class="pagina-contenido">
    <section class="contacto-pagina">
        <div class="contenedor">
            <h1>Contacto y Cotizacion</h1>
            <p class="intro-contacto">
                Completa el formulario y dinos que servicios necesitas para tu evento.
            </p>

            <form class="formulario-contacto" id="formulario-contacto" action="#" method="post">
                <div class="form-grid">
                    <div class="campo">
                        <label for="nombre">Nombre y apellido</label>
                        <input type="text" id="nombre" name="nombre" required>
                    </div>

                    <div class="campo">
                        <label for="telefono">Telefono</label>
                        <input type="tel" id="telefono" name="telefono" required>
                    </div>

                    <div class="campo">
                        <label for="direccion">Direccion</label>
                        <input type="text" id="direccion" name="direccion">
                    </div>

                    <div class="campo">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                </div>

                <div class="campo campo-completo">
                    <label>Servicios a contratar</label>

                    <div class="servicios-formulario">
                        <div class="servicio-item">
                            <label>
                                <input type="checkbox" name="servicios[]" value="sillas">
                                Sillas
                            </label>
                            <input type="number" name="cantidadsillas" min="0" placeholder="Cantidad">
                        </div>

                        <div class="servicio-item">
                            <label>
                                <input type="checkbox" name="servicios[]" value="mesas">
                                Mesas
                            </label>
                            <input type="number" name="cantidadmesas" min="0" placeholder="Cantidad">
                        </div>

                        <div class="servicio-item">
                            <label>
                                <input type="checkbox" name="servicios[]" value="manteleria">
                                Manteleria
                            </label>
                            <input type="number" name="cantidadmanteleria" min="0" placeholder="Cantidad">
                        </div>

                        <div class="servicio-item">
                            <label>
                                <input type="checkbox" name="servicios[]" value="cristaleria">
                                Cristaleria
                            </label>
                            <input type="number" name="cantidadcristaleria" min="0" placeholder="Cantidad">
                        </div>

                        <div class="servicio-item">
                            <label>
                                <input type="checkbox" name="servicios[]" value="vajilla">
                                Vajilla
                            </label>
                            <input type="number" name="cantidadvajilla" min="0" placeholder="Cantidad">
                        </div>

                        <div class="servicio-item">
                            <label>
                                <input type="checkbox" name="servicios[]" value="cuberteria">
                                Cuberteria
                            </label>
                            <input type="number" name="cantidadcuberteria" min="0" placeholder="Cantidad">
                        </div>

                        <div class="servicio-item">
                            <label>
                                <input type="checkbox" name="servicios[]" value="menajecocina">
                                Menaje de cocina
                            </label>
                            <input type="number" name="cantidadmenajecocina" min="0" placeholder="Cantidad">
                        </div>

                        <div class="servicio-item">
                            <label>
                                <input type="checkbox" name="servicios[]" value="fotografia">
                                Fotografia
                            </label>
                            <input type="number" name="cantidadfotografia" min="0" placeholder="Cantidad">
                        </div>

                        <div class="servicio-item">
                            <label>
                                <input type="checkbox" name="servicios[]" value="video">
                                Video
                            </label>
                            <input type="number" name="cantidadvideo" min="0" placeholder="Cantidad">
                        </div>

                        <div class="servicio-item">
                            <label>
                                <input type="checkbox" name="servicios[]" value="decoracion">
                                Implementos de decoracion
                            </label>
                            <input type="number" name="cantidaddecoracion" min="0" placeholder="Cantidad">
                        </div>
                    </div>
                </div>

                <div class="campo campo-completo">
                    <label>Desea transporte</label>
                    <div class="opciones-radio">
                        <label>
                            <input type="radio" name="transporte" value="si" required>
                            Si
                        </label>
                        <label>
                            <input type="radio" name="transporte" value="no">
                            No
                        </label>
                    </div>
                </div>

                <div class="campo campo-completo">
                    <label for="comentarios">Comentarios</label>
                    <textarea id="comentarios" name="comentarios" rows="5" placeholder="Escribe aqui detalles de tu evento"></textarea>
                </div>

                <div class="campo campo-completo">
                    <button type="submit" class="boton-enviar">Enviar</button>
                </div>
            </form>

            <p id="mensaje-exito" class="mensaje-exito">
                Tu mensaje ha sido enviado con exito. En breve estaremos en contacto con usted.
            </p>
        </div>
    </section>
</main>
